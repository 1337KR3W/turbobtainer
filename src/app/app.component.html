<ion-app>
  <ion-header>
    <ion-toolbar color="primary">
      <ion-title>TurboTainer - YT Downloader</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding">
    <h2>Bienvenido a la versión Pro</h2>
    <p>Esta interfaz se adaptará automáticamente a móvil y escritorio.</p>

    <ion-item>
      <ion-label position="stacked">URL de YouTube</ion-label>
      <ion-input placeholder="https://youtube.com/..."></ion-input>
    </ion-item>

    <ion-button expand="block" class="ion-margin-top">
      Comprobar URL
    </ion-button>
  </ion-content>
</ion-app>

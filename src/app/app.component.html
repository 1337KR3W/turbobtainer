<ion-app>
  <ion-header>
    <ion-toolbar color="primary">
      <ion-title>TurboTainer</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding">
    <ion-card>
      <ion-card-content>
        <ion-item lines="outline">
          <ion-label position="stacked">Enlace de YouTube</ion-label>
          <ion-input [(ngModel)]="url" placeholder="Pega la URL aquí..." (ionInput)="limpiarEstado()">
          </ion-input>
        </ion-item>

        <ion-row class="ion-margin-top">
          <ion-col size="6">
            <ion-button expand="block" color="secondary" (click)="procesarEnlace('audio')" [disabled]="!url || loading">
              <ion-icon slot="start" name="musical-notes-outline"></ion-icon>
              Solo Audio
            </ion-button>
          </ion-col>
          <ion-col size="6">
            <ion-button expand="block" color="tertiary" (click)="procesarEnlace('video')" [disabled]="!url || loading">
              <ion-icon slot="start" name="videocam-outline"></ion-icon>
              Video MP4
            </ion-button>
          </ion-col>
        </ion-row>
      </ion-card-content>
    </ion-card>

    <div *ngIf="loading" class="ion-text-center ion-padding">
      <ion-spinner name="crescent"></ion-spinner>
      <p>Analizando enlace...</p>
    </div>

    <ion-item *ngIf="titulo" color="light" class="ion-margin-top">
      <ion-icon name="information-circle-outline" slot="start"></ion-icon>
      <ion-label class="ion-text-wrap">
        <h3>Video detectado:</h3>
        <p>{{ titulo }}</p>
      </ion-label>
    </ion-item>
  </ion-content>
</ion-app>
